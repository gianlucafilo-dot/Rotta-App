 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Rotta — Ottimizzatore</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0E1B2E; color: #fff; padding: 20px; }
        .card { background: #142440; padding: 20px; border-radius: 14px; margin-bottom: 20px; }
        .btn { background: #F2B441; padding: 10px 20px; border-radius: 99px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>1. Carica File</h2>
        <input type="file" id="fileInput" accept=".xlsx,.csv">
    </div>
    <div class="card">
        <h2>2. Partenza</h2>
        <input type="text" id="originLat" placeholder="Latitudine">
        <input type="text" id="originLon" placeholder="Longitudine">
        <button class="btn" id="calcBtn">Ottimizza Percorso</button>
    </div>
    <div id="results" class="card"></div>

    <script>
        let clientData = [];
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                clientData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                alert("File caricato con " + clientData.length + " clienti.");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        document.getElementById('calcBtn').onclick = () => {
            const origin = { lat: parseFloat(document.getElementById('originLat').value), lon: parseFloat(document.getElementById('originLon').value) };
            let unvisited = [...clientData];
            let path = [];
            let current = origin;

            while(unvisited.length > 0) {
                let nearestIdx = 0;
                let minDist = Infinity;
                unvisited.forEach((item, idx) => {
                    const d = Math.sqrt((item.Latitudine - current.lat)**2 + (item.Longitudine - current.lon)**2);
                    if(d < minDist) { minDist = d; nearestIdx = idx; }
                });
                current = unvisited.splice(nearestIdx, 1)[0];
                path.push(current);
            }

            const waypoints = path.map(p => `${p.Latitudine},${p.Longitudine}`).join('|');
            const link = `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lon}&destination=${path[path.length-1].Latitudine},${path[path.length-1].Longitudine}&waypoints=${waypoints}&travelmode=driving`;
            
            document.getElementById('results').innerHTML = `<h3>Percorso Pronto:</h3><a href="${link}" target="_blank" class="btn">🚀 Apri in Google Maps</a><ul>` + path.map(p => `<li>${p.Nome || 'Cliente'}</li>`).join('') + `</ul>`;
        };
    </script>
</body>
</html>
