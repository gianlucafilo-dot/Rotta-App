<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotta — Ottimizzatore visite clienti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0E1B2E;--bg-panel:#142440;--bg-raised:#1C3052;--grid:rgba(143,173,209,0.07);--border:rgba(143,173,209,0.18);--border-soft:rgba(143,173,209,0.10);--text:#F3F6FA;--text-dim:#92A6C4;--text-faint:#5C7090;--amber:#F2B441;--amber-soft:rgba(242,180,65,0.14);--teal:#3FCDB4;--teal-soft:rgba(63,205,180,0.14);--red:#E2584A;--red-soft:rgba(226,88,74,0.14);--radius:14px;--radius-sm:9px;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background-color:var(--bg);background-image:linear-gradient(var(--grid) 1px, transparent 1px),linear-gradient(90deg, var(--grid) 1px, transparent 1px);background-size:34px 34px;color:var(--text);font-family:var(--font-body);line-height:1.5;}
.app{max-width:880px;margin:0 auto;padding:48px 20px 96px;}
.hero{margin-bottom:56px;}.hero-eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:14px;}.hero-eyebrow::before{content:'';width:18px;height:1px;background:var(--amber);display:inline-block;}.hero h1{font-family:var(--font-display);font-weight:700;font-size:clamp(40px,7vw,58px);margin:0 0 14px;}.hero h1 .dot{color:var(--amber);}.hero p{color:var(--text-dim);font-size:16px;max-width:540px;margin:0;}
.route-track{position:relative;padding-left:64px;}.route-track::before{content:'';position:absolute;left:23px;top:8px;bottom:8px;width:2px;background-image:linear-gradient(var(--border) 60%, transparent 0%);background-size:2px 10px;background-repeat:repeat-y;}.step{position:relative;margin-bottom:28px;}.step-pin{position:absolute;left:-64px;top:0;width:48px;height:48px;border-radius:50%;background:var(--bg-raised);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:15px;color:var(--text-faint);transition:border-color .25s, color .25s, background .25s;z-index:1;}.step.active .step-pin{border-color:var(--amber);color:var(--amber);background:var(--amber-soft);}.step.done .step-pin{border-color:var(--teal);color:var(--teal);background:var(--teal-soft);}.step-card{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:var(--radius);padding:26px 26px 28px;transition:opacity .25s;}.step.locked .step-card{opacity:.42;pointer-events:none;}.step-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--text-faint);text-transform:uppercase;margin-bottom:6px;}.step-card h2{font-family:var(--font-display);font-size:20px;font-weight:600;margin:0 0 6px;}.step-card .step-desc{color:var(--text-dim);font-size:14px;margin:0 0 18px;}
.dropzone{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s, background .2s;}.dropzone:hover{border-color:var(--amber);background:var(--amber-soft);}.dz-title{font-weight:600;font-size:14px;}.dz-sub{color:var(--text-faint);font-size:12.5px;margin-top:4px;}.file-meta{margin-top:14px;font-family:var(--font-mono);font-size:13px;color:var(--teal);display:none;align-items:center;gap:8px;}.file-meta.visible{display:flex;}
.mapping-grid{display:none;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:20px;}.mapping-grid.visible{display:grid;}.field label{display:block;font-size:12px;color:var(--text-faint);margin-bottom:6px;font-family:var(--font-mono);text-transform:uppercase;}.preview-wrap{display:none;margin-top:20px;overflow-x:auto;border:1px solid var(--border-soft);border-radius:var(--radius-sm);}.preview-wrap.visible{display:block;}table{width:100%;border-collapse:collapse;font-size:13px;}thead th{text-align:left;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--text-faint);padding:10px 12px;background:var(--bg-raised);border-bottom:1px solid var(--border-soft);}tbody td{padding:9px 12px;border-bottom:1px solid var(--border-soft);color:var(--text-dim);}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-weight:600;font-size:14px;padding:11px 20px;border-radius:999px;cursor:pointer;transition:transform .12s, filter .12s;text-decoration:none;}.btn-primary{background:var(--amber);color:#1A1304;}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-row{display:flex;gap:12px;margin-top:18px;}.row-inline{display:flex;gap:12px;}.origin-result{display:none;align-items:center;gap:10px;margin-top:14px;font-size:13.5px;color:var(--text-dim);padding:10px 12px;background:var(--bg-raised);border-radius:var(--radius-sm);}.origin-result.visible{display:flex;}.radius-row{display:flex;align-items:center;gap:16px;}.radius-value{font-family:var(--font-mono);font-size:20px;color:var(--amber);min-width:74px;text-align:right;}
.progress-wrap{display:none;margin-top:18px;}.progress-track{height:7px;background:var(--bg-raised);border-radius:99px;}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber),var(--teal));}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1A2A47;border:1px solid var(--red);color:var(--text);padding:12px 18px;border-radius:var(--radius-sm);opacity:0;pointer-events:none;transition:opacity .25s;}
</style>
</head>
<body>
<div class="app">
<header class="hero"><h1>Rotta<span class="dot">.</span></h1><p>Ottimizzatore visite clienti.</p></header>
<div class="route-track">
<section class="step active" id="step1"><div class="step-pin">1</div><div class="step-card"><h2>Carica anagrafica</h2><div class="dropzone" id="dropzone">Trascina o clicca per caricare file</div><input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none"></div></section>
<section class="step locked" id="step2"><div class="step-pin">2</div><div class="step-card"><h2>Partenza</h2><input type="text" id="originInput" placeholder="Es. Milano"><button class="btn btn-primary" id="originBtn">Trova</button></div></section>
<section class="step locked" id="step3"><div class="step-pin">3</div><div class="step-card"><h2>Raggio</h2><input type="range" id="radiusRange" min="1" max="200" value="30"><div class="radius-value" id="radiusValue">30 km</div><button class="btn btn-primary" id="calcBtn">Calcola</button></div></section>
<section class="step locked" id="step4"><div class="step-pin">4</div><div class="step-card"><h2>Percorso</h2><div id="resultsBody"></div></div></section>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
// --- LOGICA INTEGRATA ---
// Aggiungi qui la gestione dei file e il calcolo del percorso
// Il codice originale che avevi continua qui con la funzione geocodeAllRows completata
async function geocodeAllRows(){
    state.geocodedRows = [];
    state.failedRows = [];
    const total = state.rows.length;
    for(let i=0; i<total; i++){
        const row = state.rows[i];
        const query = buildQuery(row, state.mapping);
        if(!query) continue;
        let cached = state.geocodeCache.get(query);
        if(!cached){
            try { cached = await nominatimSearch(query); } catch(e){ cached = null; }
            state.geocodeCache.set(query, cached);
            await sleep(1100);
        }
        if(cached) state.geocodedRows.push({ ...row, ...cached });
    }
    
    // Algoritmo Nearest Neighbor integrato
    const origin = state.origin;
    let unvisited = [...state.geocodedRows];
    let path = [];
    let current = origin;
    
    while(unvisited.length > 0){
        let nearestIdx = 0;
        let minDist = Infinity;
        unvisited.forEach((item, idx) => {
            const d = dist(current, item);
            if(d < minDist) { minDist = d; nearestIdx = idx; }
        });
        current = unvisited.splice(nearestIdx, 1)[0];
        path.push(current);
    }
    
    // Generazione Link Google Maps
    const waypoints = path.map(p => `${p.lat},${p.lon}`).join('|');
    const mapLink = `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lon}&destination=${path[path.length-1].lat},${path[path.length-1].lon}&waypoints=${waypoints}&travelmode=driving`;
    
    const resEl = document.getElementById('resultsBody');
    resEl.innerHTML = `<a href="${mapLink}" target="_blank" class="btn btn-primary">Apri in Google Maps</a><ul>` + path.map(p => `<li>${p.name}</li>`).join('') + `</ul>`;
}
</script>
</body>
</html>
