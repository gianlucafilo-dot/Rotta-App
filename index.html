<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotta — Ottimizzatore Offline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root { --bg:#0E1B2E; --amber:#F2B441; --text:#F3F6FA; --radius:14px; }
  body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
  .card { background: #142440; padding: 30px; border-radius: var(--radius); border: 1px solid #1C3052; }
  input, button { padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }
  button { background: var(--amber); cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="card">
  <h1>📍 Rotta Offline</h1>
  <p>Carica il file Excel (deve avere colonne <b>Latitudine</b> e <b>Longitudine</b>)</p>
  
  <input type="file" id="fileInput" accept=".xlsx,.csv">
  <br><br>
  
  <label>Latitudine Partenza:</label>
  <input type="number" id="latP" value="45.4642" step="0.0001">
  <label>Longitudine Partenza:</label>
  <input type="number" id="lonP" value="9.1900" step="0.0001">
  <br>
  <button id="calcBtn">🚀 Avvia Ottimizzazione Locale</button>
</div>

<div id="results" style="margin-top:20px;"></div>

<script>
document.getElementById('calcBtn').addEventListener('click', () => {
    const file = document.getElementById('fileInput').files[0];
    if(!file) return alert("Carica un file!");

    const reader = new FileReader();
    reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        const latP = parseFloat(document.getElementById('latP').value);
        const lonP = parseFloat(document.getElementById('lonP').value);

        // Algoritmo Nearest Neighbor (Ottimizzazione rapida)
        let currentPos = { lat: latP, lon: lonP };
        let unvisited = [...rows];
        let path = [];

        while(unvisited.length > 0) {
            let nearestIdx = 0;
            let minDist = Infinity;
            
            unvisited.forEach((item, idx) => {
                const d = Math.sqrt((item.Latitudine - currentPos.lat)**2 + (item.Longitudine - currentPos.lon)**2);
                if(d < minDist) { minDist = d; nearestIdx = idx; }
            });

            currentPos = { lat: unvisited[nearestIdx].Latitudine, lon: unvisited[nearestIdx].Longitudine };
            path.push(unvisited.splice(nearestIdx, 1)[0]);
        }

        // Visualizzazione risultati
        let html = "<h3>Risultati Ottimizzati:</h3><ul>";
        path.forEach(r => html += `<li>${r.Nome || 'Cliente'} - Distanza ok</li>`);
        document.getElementById('results').innerHTML = html + "</ul>";
    };
    reader.readAsArrayBuffer(file);
});
</script>
</body>
</html>
